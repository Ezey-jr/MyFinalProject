<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="signIn.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <div class="container">
      <div class="signInCon">
        <div class="logo">
          <i class="fa-solid fa-qrcode"></i>
          Blueco
        </div>
        <h1>Login to your Account</h1>
        <div class="signInLogos">
          <i class="fa-brands fa-facebook-f"></i>
          <i class="fa-brands fa-google-plus-g"></i>
          <i class="fa-brands fa-linkedin-in"></i>
        </div>
        <p>Or use your google account</p>

        <form action="">
          <div class="signInData">
            <i class="fa-regular fa-envelope" id="emailIcon"></i>
            <input type="email" placeholder="Email" id="Email"/>
          </div>
          <p id="emailError" class="error"></p>

          <div class="signInData">
            <i class="fa-solid fa-lock" id="lockIcon"></i>
            <input type="password" placeholder="Password" id="Password" />
            <i class="fa-solid fa-eye-slash" id="eyeIcon"></i>
          </div>
          <p id="passwordError" class="error"></p>

          <button class="signInBtn" id="signInBtn">Sign In</button>
        </form>
      </div>

      <div class="signUpCon">
        <div class="signUpdetails">
        <h1>Welcome Back!</h1>
        <p>To keep connected with us please login with your personal info</p>
        <button class="signUpBtn">
          <a href="../signUp/signUp.html">Sign Up</a>
        </button>
        </div>
      </div>
    </div>
    <script src="signIn.js"></script>
  </body>
</html>
