<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="user.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Oswald:wght@200..700&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="mainContainer">
      <div class="profileCon">
        <img src="img9.jpg" alt="profile pic" />
        <h1>Ezey Jr</h1>
        <p><a href="">Click here to change your profile picture</a></p>
        <ul>
          <li><a href="user.html">Profile</a></li>
          <li><a href="../../templates/dashboard.html">Dashboard</a></li>
          <li>
            <a href="" id="registerBtn">Register</a>
            <ul id="registerMenu" class="menu">
              <li><a href="../signIn/signIn.html">Sign In</a></li>
              <li><a href="../signUp/signUp.html">Sign Up</a></li>
            </ul>
          </li>
        </ul>
      </div>

      <div class="formCon">
        <h2>User Profile</h2>
        <form action="">
          <label for="name">Username</label>
          <input type="text" />
          <label for="name">First name</label>
          <input type="text" />
          <label for="name">Last name</label>
          <input type="text" />
          <label for="email">Email</label>
          <input type="email" />
          <label for="number">Phone number</label>
          <input type="number" />
          <label for="gender">Gender</label>
          <select name="gender" id="">
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="gay">LGBTQ</option>
          </select>
          <label for="Birthday">Birthday</label>
          <input type="date" />
        </form>
      </div>

      <div class="formCon">
        <label for="job">Job</label>
        <input type="text" />
        <label for="">Language</label>
        <select name="language" id="">
          <option value="">English</option>
          <option value="">Spanish</option>
          <option value="">French</option>
          <option value="">Japanese</option>
        </select>
        <label for="country">Country</label>
        <input type="text" />
        <label for="city">City</label>
        <input type="text" />
        <label for="password">Password</label>
        <input type="password" id="password" class="pass" />
        <i class="fa-solid fa-eye-slash" id="eyeIcon"></i>
        <label for="address">Address</label>
        <input type="text" />
        <label for="bio">Bio</label>
        <textarea name="" id="">Add bio here...</textarea>
      </div>
    </div>

    <script src="user.js"></script>
  </body>
</html>
